name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: version-bump-and-release
  cancel-in-progress: false

jobs:
  extract_version:
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, 'bump version to')"
    outputs:
      new_version: ${{ steps.check.outputs.version }}
      skip: ${{ steps.check.outputs.skip }}
      logs: ${{ steps.changelog.outputs.logs }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract Version and Validate
        id: check
        run: |
          # Get the commit message
          MSG="${{ github.event.head_commit.message }}"
          
          # Regex to match "chore(app): bump version to x.x.x" and capture the version
          if [[ "$MSG" =~ chore\(app\):\ bump\ version\ to\ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "MATCH: Found version $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "NO MATCH: Skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate Changelog
        if: steps.check.outputs.skip == 'false'
        id: changelog
        run: |
          # Find the previous tag (suppress error if no tags exist)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # The Regex pattern for your version bump
          BUMP_PATTERN="^chore\(app\): bump version to [0-9]+\.[0-9]+\.[0-9]+"
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found. Logging all commits."
            LOGS=$(git log --no-merges --invert-grep --extended-regexp --grep="$BUMP_PATTERN" --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))")
          else
            echo "Generating logs from $PREV_TAG to HEAD"
            # Log commits excluding the current bump commit
            LOGS=$(git log "$PREV_TAG..HEAD" --no-merges --invert-grep --extended-regexp --grep="$BUMP_PATTERN" --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))")
          fi
          
          # Handle multiline output for GITHUB_OUTPUT
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "logs<<$EOF" >> $GITHUB_OUTPUT
          echo "$LOGS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
  
  build_app:
    needs: extract_version
    if: needs.extract_version.outputs.skip == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'server/go.mod'
          cache: true
      
      - name: Set up GCC (MinGW) for CGO
        shell: bash
        run: echo "C:\msys64\mingw64\bin" >> $GITHUB_PATH

      - name: Install Dependencies
        shell: bash
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: |
          bun install

          cd server
          go mod download

      - name: Build App
        shell: bash
        env:
          CGO_ENABLED: 1
        run: |
          bun run build
          go run server/build/build.go

          # Rename the package for the specific platform
          mv "./dist/server/premark.exe" "./dist/premark-windows-x64.exe"
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-binary
          path: ./dist/*.exe

  create_release:
    needs: [extract_version, build_app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-binary
          path: ./dist

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.extract_version.outputs.new_version }}
        run: |
          echo "Creating release v$VERSION..."

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "${{ needs.extract_version.outputs.logs }}" \
            --target "${{ github.sha }}" \
            ./dist/*.exe